body:
  text: 敘杪春聞茹穹祝君遊於瀟水鈐山之間豫時病甚急欲拿舟溯洄相訪逡巡未能也無何觀察田公投豫書二帙急讀之而頗悉祝君之提醒靜功心醫紀驗作而嘆曰斯其為壽身壽世之要道是謂仁者以天地萬物為一體豈為方術家呼吸吐納之窅說乎祝君夏日過章門豫邂逅適願獲覽其所惠諸集益為嚮慕豫聞萬物耗於動而生於靜靜者神明之舍群生藝藝於此待命而斟酌不竭者也惟靜能養孟子云苟得其養無物不長是豈落見聞知解者武侯志在經世而曰非寧靜無以致遠宋儒紹明聖賢之道統亦只使人於靜中看喜怒哀樂未發氣象夫世間聲色貨利人我是非一息而攻取構誘者百千萬狀惟靜以照之如杲日當空氛翳盡掃是為蟠地際天繼往開來莫大之功用故曰靜功祝子之學蓋性命道德之指歸而非神仙方術之餘唾也若其醫效等於見垣刀圭立起痼疾祝君實有一段濟世利物之念惄如飢渴亦猶自任天下之重者引匹夫不被為己辜吾固謂此仁者萬物一體之學非至誠不能與於斯宜其守漳之日痛憫溝瘠家至而戶診郡篆在前藥囊在後即以此脫屣五馬無悔也夫天下大矣負疴抱痛者衆矣茹穹不能以一身為風馬雲車故集方紀驗廣布以拯世而靜功之玄妙與之俱傳以俟解人之自悟大司馬總制郎公為序以行而不佞為數語殿其後夫豫所言則猶是儒者主靜之學聖賢成己成物之旨也神仙有無何渺茫茹穹所親授於無生子李華卿者甚奇而道緣藥緣其所作合更深更廣異時得從匡廬雲水奉杖履以周旋茹穹傾筐倒篋以開示愚蒙當必有進於斯者視豫所言真不啻管窺而蠡測矣順治丙申之秋七月既望南州熊文舉謹書靜功靜功妙藥醒語諸病皆有藥獨此心一動諸患為招雖百華他扁鵲在旁無處下藥識破此疾一庸醫能事也昔陳烈苦質鈍靜坐百日頓開記性遂一覽無遺夫未來之覺尚可使之有豈已往之疾不能使之無坐忘篇曰心者身之主神之帥也靜則生慧動則生昏信然老子云出息微微入息綿綿深根固蒂此長生久視之道也內觀經曰氣來入身謂之生神去於形謂之死通乎生死謂之道夫能惜精寶神有聞如不聞有見如不見靜中討出消息則所以長生者也動則頑惡將歸焉如石然雨滋露潤流而不存故常磽瘠靜則虛善將歸焉如谷然雨滋露潤存而不流故能為五穀田考古神仙多因疾病困苦中得之蓋人安樂必好動好動必至淫欲而腠理日疏使有沉疴不藥之患人疾病必好靜好靜必思修養而澡心求進即為脫苦成仙之基七情擾擾隙開疾生譬之蠹以木生而害木也苟能默省己愆心既清淨體亦安泰雖罪業亦已消除況微疴寧不速滅昔程子見人靜坐即嘆其善學朱子又欲以靜坐補小學收放心一段工夫如種樹靜則根深而暢焉茂焉動則蒂撥而摧焉折焉動者寧惟造作乖張凡妄想妄言妄行盡是無窮孽障靜者不但神氣安養凡治民治物治國無非收拾本末智大者盤桓以山峙靜之謂也器小者蓬飛而萍浮動之謂也對青天而懼聞雷霆而不驚履平地而恐涉風波而不疑惟靜有守惟靜有為一切諸有如夢如幻一切煩惱是魔是賊曷想未生前為空爾生時為孽爾死後為灰爾是則同於獸等於草爾何計而留性根老子曰生我者神也死我者心也故心以神為主其身安靜其神居之其身躁動其神去之是以外其身存其神靜心守一則神不出身與道同可以長生少言不為人所窮少行不為人所短少智不為人所勞少能不為人所役人生何事不宜靜氣靜而清者天之象心靜而寧者地之象性靜而明者日月之象根靜而萌者萬物之象昔賢云人有一病便有一治法如病驚悸習散忘以平之憂鬱習歡喜以開之風濕習導引以驅之流泄習提咽以堤之不足儉塞以培之有餘淡薄以伏之因病發藥即迷起照靜功而已燈非膏不燃膏溢燈滅谷非水不成水淫谷朽病者前食未化又加餐焉病益增惟動騖乎多其數必危惟靜守乎約其身乃安鳥逾薄食翼飛益高食多如鵝鶩肥軀爾害將至香美爍形皓齒損精靜功自無茲病靜功妙藥八懿靜功不生怒世界兩種人善與惡而已善人宜敬不宜怒人惡猶身疾身有疾見者重加悲憫人而惡其疾尤甚何必怒焉怒於氣為戾於德為凶蜂緣怒螫物物止於痛而傷自身靜功不生傲炭在爐不蒙以灰轉瞬紅且滅方修德而不知處謙是亦不終日之計也故靜功如貧益富如賤益貴如愚益智剛蓄於巽明養於晦靜中作用戒人知尤戒自知貴能藏尤貴能忘靜功不好誕語云嗜異味者必得異病挾怪性者必得怪症習陰謀者必得陰禍作奇態者必得奇窮世間千能百巧都不濟事惟平平常常絶無異於人而人自勿及斯免異端之害也靜功必寡欲玄門家採戰之說此為大謬腎為精之府凡男女交媾必搖其腎腎動則精血隨之而流外雖不泄精已離宮未能堅忍者亦必有真精數點隨陽之萎而溢出此即病根是故寡欲為藥之最妙者靜功必節勞不獨房室之事能損吾精凡勞於視精以視耗勞於聽精以聽耗勞于思精以思耗夫惟物冥於外神鑑於中不求靜而愈靜譭譽善惡不入於心心靜則虛虛則道來屬矣靜功必慎言酒戒多入口酒入舌出言戒多出口言出禍入人自囂然議論而吾靜中觀看人物即不得已有言亦天地間不可少之至理也故惟靜功在寂能惺在境不亂可以處心可以處世靜功必戒殺形殊而性命同凡物皆然但人能操生殺之權物遂聽之莫可誰何其有聲即是怨詈不則以目相視無限痛切靜中參透一體活烹生割之事聞聲知苦觸眼心割是其為衆生之繫命也宜福且壽靜功必及物見人飢寒思拯之見人疾病思療之隨力為人方便力有不及常勸人為方便其入手時天地萬物同在腔子里政恐一陴之瑕萬堅無益一惡之形萬善有缺既云妙藥必將天下人共嘗此味也靜功妙藥前珍是集考古名論出以心裁如七返九還飛升蟬脫之說削去以杜疑玄如清心寡欲養修得道之章奉之有同珍寶或得諸舊編或得諸記聞勿謂陳筌是真妙藥朱子調息銘云靜極而噓如春沼魚動極而吸如百蟲蟄春魚得氣而動其動極微寒蟲含氣而蟄其蜇無朕調息者須似之綿綿密密幽幽微微呼則百骸萬竅氣隨以出吸則百骸萬竅氣隨以入調之不廢真氣滋生藥物之老嫩浮沉火候之文武進退胥在此中靜功隨乎四時春食朝霞者日始出赤氣也夏食三陽者南方日中氣也秋食瀹漢者日沒後赤黃氣也冬食沆瀣者北方夜半氣也習閉氣而吞之名曰胎息漱舌下泉而咽之名曰胎食得此道也可以卻病勤而行之可以辟穀靜功之法垂簾塞充心頓於息隨息而入隨息而出凝住念頭不在上下不在左右中間良久喘息漸微綿綿歸元自然虛豁之地倘如念起再頓再凝念止而胎息自應陰符云人有三要曰耳目口耳目者神之牖口者氣液之門若夫六識皆空湛然虛寂遺形忘物慧照通神者至靜也吐納以導五臟導引以開百關持誦寶章以怡神吸引二景以集明鍊金精以固形餐玉英以保身者至動也是為動不離靜太上曰靜者性也動者氣也動靜如一內外和順非至人安能至於斯形以食味神以食氣若以時而食其氣則百體順理吾之身有精光之神形影之神毛孔之神各萬有二千五臟六腑三元九宮亦皆有神惟吾不見其神則不知其能禍福故不務敬畏至於狠躁凶虐貪淫陰險是曰賊其神妄言綺語以為人不知不見是曰昧其神吾之神上通於天賊神者犯天昧神者欺天犯天欺天所以取夭折者也夫能守中抱一以陽煉陰則尸亡魂喪而神明旺矣神明既旺則策轡八晨飛輿五嶽升九玄斬玉關可與天地等年九皇丹經曰晝咽靈液夜服真氣久則氣輪自運於三宮如波濤之聲所以心合於氣氣合於神融而且和泯泯澄湛不逐於物入於不動之境故曰神能御氣則鼻不失息如嬰兒之在胎是以胎息者上至於氣關肺也下至於氣海臍下一寸三分非若口鼻之勞也真人之息以踵何也氣伏於下元則其息長而邃矣情欲出於五內魂定魄靜生也情欲出於胸臆精散神或死也精從下流氣從上散水火各背不得凝結皆是此心使然愛念不生此精必不下流忿念不生此氣必不上炎一念不生萬澄寂則水火自然相見靜功妙藥九種豫幼年習八股業工夫只在夜間披華振秀屢試輒冠軍揣摩既久覺八股無甚用處究心醫理地理諸傳自趨庭傳授而外遊名山大川訪高人異士讀已見書並讀未見書名師剖晰祕訣始多醫理地理確乎有驗著有天文祕占地理確義先師真本諸刊久已行世因欲步三大幹龍未及其一而足疲矣偶一日入高巔深林十數里無人煙日已暮遠望平坡有小草篷急往投之見一老者詢其年不答叩以薪火借炊曰無有心私異之此必高人也下拜求教云與豫有夙緣授以坐功至半夜忽然骨節俱響遍體快暢如嬰孩胎中不可名狀此身在羲皇以上竟不知有今世境老者曰此開關也數日登山勞倦筋骨疼痛至此俱釋津液滿口腹不知飢心又異之此殆卻病休糧祕訣也後復訪則並草篷不復見矣至丙子科寓湖南淨寺見一道者在寺前靜坐視其概與豫無異請入寓因語豫以草篷即豫師無生子也豫前所傳止有手訣心訣此即吾儒正心誠意心齊坐忘真旨一切語言文字見解造作皆無所著道者始詳語四戒五進六不傳諸則閲三日而道者不知何往嗟乎其即向草篷者哉豫何緣之淺而覿面失也嗣後與葛屺瞻先生郭丹葵先生馮茂遠先生九十四歲翁陳白也先生相參祕旨諸公自以嚮者閉息導引十六字八段錦與夫三字六字十二字七轉九還及袁了凡先生禪印坐功諸法行之皆驗然終涉有為不若無生子直捷了當妙蘊無窮問道盲者然無生子之訣不涉語言難陳紙筆若夫袁葛郭陳諸公其閉息導引諸法或舊本所有或口相授受豫得而編輯之俾好道者開卷有得是亦囊中妙藥延年卻病多服為佳者也閉息先將凡慮滌卻擇淨室靜坐閉目鳴天鼓三十有六以集神咽液三十有六以聚氣而陰戶可以陰合使衆邪不得下居閉氣自一至十默數九九而止非閉噎其氣也乃神定氣和絶思忘慮使鼻之息若有若無診其脈六動為一息九九者八十一息總四百八十六動脈也常存赤氣自其口出狀如火輪周其室中定則內想安寢自然疾病除而陰邪遠矣初閉息經十息至五十息至百息氣不在上亦不在下如遊渾沌不能破散凡一日一夜一萬三千五百息太微升玄經云氣絶曰死氣閉曰仙魄留守身魂游上天先吹出口中濁氣七口以手指捏目大小眥按鼻左右旋耳摩面乃以舌抵上齶撩口中內外津液三十六轉滿口咽之如此三止漱咽靈液灌溉五臟面乃生光黃庭篇曰元氣者出於下丹田流注於身凡晝之午則陽極而陰生故會合於泥丸陰陽相推循環無窮夫能服氣固精得其節符則靈氣凝變如紫煙白雲充於三田升為云降為雨以之溉灌五臟而植根者也上納津液下勿泄其氣氣液充滿如深井之出湧泉自然洞流無窮通於鼻門而入於口滋於身如是則黃鉛紫汞生矣依時採而煉之入于丹田貫諸百節自然出暗室而照真陽之門故曰回紫抱黃入丹田者此之謂也五氣各屬一臟餘一氣屬三焦穴氣者噓呵呬吹呼嘻噓屬肝肝主目呵屬心心主舌呬屬肺肺主鼻吹屬腎腎主耳呼屬脾脾主中宮嘻屬三焦各臟俱有濁氣人夜睡醒時口中濁氣熏蒸自不聞耳口則吐之鼻則納之吐之說不過初吐濁氣盡即止後皆津液清丹全在閉口方能咽下若一納一吐是隨收隨散也閉氣全要腹空日間端坐申腰如坐禪法以鼻納氣照前夜間須要睡醒子時後正臥側臥無不妙閉氣之法勤而行之火候篇曰閉氣二十有四其數足矣出則復閉用赤龍右攪者七左攪者九漱者十有六琢齒二分三咽先右次左次中此陰爻也閉氣三十有六其數足矣出而復閉用赤龍左攪者七右攪者九漱者三十有三琢齒三分三咽先左次右次中此陽爻也凡閉氣一百九十二以火二八兩煅之學者當明水火既濟之法夫火在心為性水在腎為命二者實相須以濟焉腎之水非心之火養之則不能上升心之火非腎之水藏之則不能下降夫能長養成就上際下蟠旁通曲引於三元九宮五臟百節斯可以保固而長存也常人每臥時垂足閉氣舌抵上齶目視頂提縮穀道即咽津一口共行九遍熱擦腎腧穴九九數少年可御夢遺老人可愈頻溺導引漱舌下泉咽之名曰胎食得道者生六翮於臂長毛羽於腹飛無階之蒼天度無窮之世俗習不唾法有則含以咽之使人精氣常留面目光彩又曰津液者吾身之寶寶聚則為富翁寶散則為貧客人身中夾脊與規中相對用鼻息呼吸呼者呼自己之元氣從中而出吸者吸天地之正氣從外而入吸要從氣海上肺之上貫下丹田入命門丹田臍下命門臍中與祖氣穴即下丹田在臍下一寸三分相連如磁吸鐵同類相親也非止救護命寶抑能添油接命故修長生者必固其氣氣固則身中元氣不隨呼而出天地之正氣恆隨吸而入久之則胎息定鄞鄂成行氣在照玄膺舌下有三竅中玄膺左金津右玉液一竅以舌折而舐之少頃則津液滿口微漱數遍徐徐以意引下至重樓咽喉漸達膻中胸前中脘心間神闕規中至下氣海穀道前就從氣海分開兩路至左右大腿從膝至三里穴在膝下下腳背及大拇指轉湧泉在腳底心由腳跟腳彎循大腿而上至尾閭穀道後合為一處過腎堂夾脊陶道大椎天柱分送兩肩兩臂至手背由中指轉手掌一齊旋回過手腕由腋至胸旁歷腮後從腦灌頂復下明堂腦前眉上上齶以舌迎之至玄膺而止此為一轉稍停又照前行動則壅滯疏通貫穿諸經通達諸竅是玉液煉形也然行氣須用眼者目之所至心亦至焉心之所至氣亦至焉其用液者液中有氣液氣相生為金液之基作潤身之寶穿關透節無處不到況玄膺乃津液之海生化之源灌溉一身皆本於此以此法行之無有舛錯坐畢當於頭面散火理五臟之氣散火先搓兩手熱摩面三十六次須周匝隨摩頂門三十六次摩腦後二十四次手掩兩耳擊二十四次次摩上元六合穴三九二十七次此穴在兩眼梢外陷處此穴一名攢竹用兩食指按之又兩大指按耳珠旁聽會穴共三九二十七次次以兩手背摩兩眼二十四次又以兩手中指掐近鼻眼角轉二十四次隨掐眼梢轉二十四又側兩手摩眼眶二十四又搓兩手第二指及中指熱夾兩耳摩耳前二十四後二十五共四十九次又搓兩手中指熱摩鼻兩旁三十次隨以手托天三次即以右手摩左手自肩及臂至指三十六次左手亦如之每指屈其節令有聲後搓兩手熱摩腎堂八十一次摩遍身三十六次摩腿膝至足趾三十六次又以右手摩左足心湧泉穴八十一次左手摩右足心八十一次然後以意歸至丹田臍下一寸三分際守之靜坐片時而起坐用抱中集神訣法將左足抵大中極右足盤兩手掐子紋左手按臍右手按臍下靜坐凝神先叩齒三十六通以集神漱津滿口以意送下丹田運河車正氣于丹田中溯尾閭透雙關上腎堂沖夾脊上陶道過天柱至玉枕住泥丸少頃下至鵲橋入喉至胸過玄關至臍穿後二腎中間玄牝而止如此三十六通或八十一通愈善功畢復叩齒三十六通咽津液三口使神不散後坐床上兩足雙並以目視頂舌抵上齶握固縮穀道搖颭為之兩足如氣球狀氣極即休如有足痛日行七八次平時只轉三十六次可也此乃導引祕法功畢以左足下地默祝曰乾元亨利貞右亦祝曰日月保長生各三祝葛真人曰靈龜俊鵠千歲不食者善息故也舌之下有三穴焉左曰金津右曰玉液中曰玄膺皆湧生甘泉以灌於氣海氣海者命門也此生死之岸也神氣精身之三寶也保之之要有三焉始以導引百骸通流血脈以安其體中以勤修百行抱制魂魄以全萬神終以淘煉本元飛行日月以復其真精真精得一可以仙矣治身之要在乎存想閉目內視而使神識氣氣識神於是氣為神胎神為氣主神氣相合而自然此真想也日月既足可以出入其殼矣肺主氣者也是為華蓋下通於命關上貫乎神廬氣或不通則鼻塞矣於是存其白元靜調六氣呬噓呵吹呼嘻可以革壅滯者矣白元者肺之真氣也治身莫先乎行氣氣活則血榮血榮則精實精實則神靈而四海內豐矣四海者氣血精髓也其要在乎戒五傷焉咸多心傷苦多肺傷酸多脾傷辛多肝傷甘多腎傷不特此也久視血傷久臥氣傷久立骨傷久坐肉傷久行筋傷知此者血氣調理上窮七返下究九還煉真元服金液於是血成乳氣成云骨成金髓凝霜矣肝藏魂者也忍怒可以制陰抑喜可以養陽一陽起於子而至於巳則六陽極矣常人之真氣遇極則飛散達生之士觀其極則內生一陰自午至亥則六陰極矣內生一陽陰陽相推生生不已故得神全精復與天地相久此何道乎用七日來復之候以攝魂還魄煉丹結胎者也腎堂者玄關也心腎合為一脈其白如線其聯如環中廣一寸二分包一身之精粹是為九天真一靈和之妙氣至精活命之深根者也常能存固則二部之海水應刻定候其潮自生至於生門矣生門者幽關之戶也水之運也及冬至則王氣極夫能實其腎則凝為白金得乎離火則為還丹矣脾者元氣之根也能消穀分氣其脈下貫於命門臍下一寸三分是為下丹田命門者性命之門非獨右腎已也常溫養脾火使土氣充盈則體強而本固矣膽者六府之精也主諸氣為外應乎目瞳鼻柱煉三元之氣既久則五臟之靈光夜燭矣鼻之氣出清入玄者也夫存想發火運載河車不離乎呼吸而已於是煉其津液而入於玄宮腎之鉛汞飛出於上道乃上下關鍵而不泄聖胎斯成矣舌之吐縮漱津咽液當如江河之注五內源源不絶可也善治生者先治其心將躁則安之將邪則止之將求則舍而抑之將濁則清而澄之行止於是造次於是久之則物冥於外神鑑於中不求靜而愈靜於是動寂俱忘天真自適矣語曰子欲不死腸中無滓子欲長生腸中當清故宜食太和之精氣焉夫欲實其腹先虛其心心主靜者也氣主動者也通乎道者翱翔海宇之外而心常寧焉休息毫釐之間而氣常運焉靜然後能契至虛虛極則瑩天地之大莫能逃乎方寸矣精景按摩經曰臥起平氣正坐先叉左右手度以掩其頸後因仰面視上而舉其頸使頸與左右手爭為之三四止使人精和血通風氣不入已復屈動其身體伸手四極反張側掣宣搖百關為之各三焉已乃咽液二十過以導內液常行之則體不垢邪氣不幹矣太素丹經曰一面之上常以左右手摩拭之使熱高下隨形皆使極匝使皺斑不生光澤如少女所謂山澤通氣者也耳目者尋真之梯級總靈之門戶也以手按眉後之穴三九過是上元六合之府也以手心及指摩其目顴上以手旋兩耳行三十過其摩數數然無時也既已則以手逆乘額上三九過從眉中而復上行入髮際咽液無數常行之目清明矣目之下顴之上是決明之津也以手旋其耳採明䁐膜之道也夫人之老鮮不始於耳目者也以手乘其額而內存赤子則日月雙明上元喜矣於是三九之數是為手朝三元固腦堅發者也首之四面以左右手乘之順發就結令多則首血流散風濕不凝矣以手按目二九過是為檢目神耳數按抑則聰徹名曰管治城廓名書皇籍鼻數按其左右則氣平名曰灌溉中嶽名書帝籙目欲瞑而內視以見其五臟則腸胃明徹杜廣平授玄白之道於介先生嘗旦旦坐臥任意存於泥丸其中有黑氣焉次存於心其中有白氣焉臍之中有黃氣焉其初存也氣出如豆既而漸大沖天於是三氣如雲纏咽繞身而覆身之上變而為火在三咽之內復合景以煉一身一身之內五臟照徹如是旦而行之至日中而止於是服氣百有二十過所謂知白守黑可以不死煉精有法全在腎家下手內腎一竅名玄關外腎一竅名牝戶真精未泄乾體未破則外腎陽氣至子時而興人身之氣與天地之氣兩相吻合精泄體破而吾身陽生之候漸晚有醜而生者次則寅而生者又次則卯而生者有終不生者始與天地不相應矣煉之之法須半夜子時披衣起坐兩手搓極熱以一手將外腎兜住以一手掩臍而凝神於內腎久久習之而精旺矣一切導引以閉息為主一切修養以斷欲為主息不閉則氣不聚雖導引何益欲不斷則精不住雖修養無功導引療未患之疾通不和之氣動之則百關氣暢閉之則三官血凝法藏碎金曰修協用二法止觀也導引也止念令靜觀理令明念靜理明無生可成導氣令和引體令柔氣和體柔長生可求又云百體導引貴乎動久久必和柔此道家之妙用也一心檢攝貴乎靜久久則明徹此禪家之妙用也踴身令起平身正坐兩手叉項後仰視舉首左右招搖使項與手爭次以手扳腳稍閉氣取太衝之氣太衝穴在大指本節後二寸骨罅間陷者左挽如引弓狀右挽亦如之以手按目近鼻之兩眥閉氣為之氣通即止引畢以手按目四眥三九遍捏令見光明捏目四眥畢即用兩手側立摩掌如大開目尉睛數遍以兩手按眉後小穴中二九一年可夜作細書眉後小穴為上元六合之府主化生眼暈和瑩精光長珠徹瞳保煉月精是真人坐起之道紫微夫人曰仰和天真俯按山源天真是兩眉之角山源是鼻下人中也兩眉之角是徹視之津梁鼻下人中是引靈之上房葛屺瞻曰豫賦稟最弱壯年間每房勞則三日不出戶七日不易衣臨文畢時吐血眩暈藥力無效自傳閉息導引之術苦坐百日始得開關覺神氣漸旺行之三年無房勞諸病進飲食長精血悅顏色得力於此不少矣閲三十年餘又得傳靜忘坐功既不行氣又不咽津即導引皆無所用惟是閒時便靜坐掃卻一切獨證本來吾身有天地靜中光景逼現後並此光景亦復不存並精氣神付諸烏有直到有生以前無處著腳去所殆顏氏坐忘真樂歟自以道妙盡於此矣今更得無生子五進四戒祕旨斯真證宗第一義也郭丹葵曰豫好道數十年精氣神會合處所實覺有得只導引之法行之殊煩難不免作止惟每晨取幼女津唾服之以多為貴久久百節靈通飲食加進即今大耋而玄發青髭登山如平地也豈不驗哉祝茹穹曰此傳未嘗不妙未嘗不驗慮食生也進以熟則無量其法當使女人頭晚用擦牙藥漱淨至半夜後或清晨女人亦叩齒漱舌下泉滿口接取過口再漱服之斯還元之祕訣不老之奇方也竺陽子馮茂遠曰嘗觀象於乾坤姤復知契言剛柔有表裡為消息陰陽至義蓋易象自姤至坤皆表柔而里剛陰凝合而生陽於內也廣成子曰為汝遂於大明之上矣至彼至陽之原原至陰也自復至乾皆表剛而里柔陽變動而生陰於內也廣成子曰為汝入於杳冥之門矣至彼至陰之原原至陽也是故乾之靜專即坤之靜翕匪翕也於何有專乾之動直即坤之動闢匪闢也於何有直夫是以乾道變化各正性命保合太和必以坤為道廬也日月之有明亦若是矣其明者金也至陽之精日之魂也其黑者水也至陰之精月之魄也由三日復明立表微剛至望為純乾柔皆在裡契言子藏母胞謂水為金子水固未嘗滅也由十六生魄表吐微柔至晦為純坤剛皆在裡契言母隱子胎謂金為水母金亦未嘗亡也徐子云利用安身隱形而藏又云推情合性轉而相與此藏彼轉互為室宅玄家擬諸呼吸以相含育亦知夫呼以吸為根吸者呼之窟乎亦猶夫天地之息踵於地日月之息踵於月乎或測之以七衡四遊二陸九道要皆跡耳安所見呼吸哉惟夫地氣升降而見乎卉凋蟄啓月光吞吐而見乎兔闕桂舒則若有呼吸存焉然仰求之光氣之交曾莫之往來而煉士必欲循呼揣吸高者搏空卑者逐末相牽入九里昏霧以及皓首殆哉至真歌云但看嬰兒處胎時豈解將心潛算計試嘗燕居合天地為元包連旦暮如胎處無營無慮滿六虛是一團元和於中微有一息綿綿沖虛自在正爾虛極靜翕寂如坤土久之靜極發機形於庚辛之金金中含有元精即玄家所欲採於腎府之真鉛也由火不下蒸金不生水然此火非他亦坤元本來具足念息神存隱明內照則元氣自聚元精自産瞥爾潛潭吐萌如契言日施德而月生光又言陽燧以取火非日不生光乃其象也從此絪縕蒸潤鉛氣自騰皆由天然真火自生自育沖而徐盈非關意識下交上達轉運以致之只要閒閒靜住委心虛無聽其熏蒸如雷雨之動滿盈三宮自然生陰化液鉛汞自合如契言太陽流珠得金華而化白液喉中覺有甘津是其驗也又契言方諸非星月安能得水漿此月亦非他即悟真篇禪光終日照西川之月耳可見通一身全體大用皆其消息相因先天不離後天坤壚便是乾鼎特於剛柔表裡陰陽動靜之際氣液交養伏蒸變化以陶真煉形若可求之呼吸而不盡繫於呼吸故曰黃中漸通理此陰中煉至陽之下手元基二液還丹亦莫不由之始矣曾何有於危殆而悟真言受氣之初容易得抽添運火要防危何謂哉謂陰陽之升降自右轉子而訖卯自東旋午而至酉此時最易昏散防有陰陽小變之虞若用意觀照防有浮沉溢度之患忘與助皆害也豈徒不作丹而已乎太上云形動德散氣越道叛陳虛白雲念起則息粗意散則火冷正為卯酉中刑德相負刑即死戶德即生門其機如此其危如此其最玄最妙又如此玄修之士夫亦肅括元樞而握機無極乎陳白也曰道家諸法自是不可少的豫所祕傳有更直捷更神妙者不用閉氣不用導引不用咽下汩汩然有聲並不用夾脊規中泥丸等相照應只一竅字妙不可言機全在目人目外視能見物內視能見神見物則昏見神則明每晝夜得閒便坐不拘屈坐不拘椅坐先用手搓熱摩眼畢隨閉手交臍下叩齒七十二漱舌下泉七十二攪上齶七十二多寡津液任其自吞然後以目視竅此竅不在心上不在境上但覺目神所至有一圓圈視之不已其光漸大充塞吾身遍大世界皆不出此竅內視久神化不知有吾身不知有天地並不知有竅而身內藏竅毛竅骨節竅一氣周流百體從令行之一年覺有內陽一點從臍下動蕩如婦人有孕然行之二年此一點透上頂門三年而成混沌而成交媾而成嬰兒遂聖而不可知矣祝茹穹曰謹聞命八段錦法依閉氣行於夜半後生氣初動時濁氣口中吐之清氣鼻中納之子後午前各一次先去一切思慮閉目冥心盤趺而坐握固靜思集神然後叩齒三十六後又兩手向項後數九息勿令耳聞乃移兩手心掩兩耳先以第二指壓中指彈擊腦後左右各二十四次搖頭左右顧肩膊轉隨動二十四以舌攪口齒並左右三十六待津液滿口漱三十六分作三口如有硬咽下汩汩然有聲龍者液也氣者虎也液行氣自奔發乃以鼻引清氣閉之少頃搓手令極熱微微放氣出腰後外腎為精門搓兩手心熱背後摩腎堂三十六畢仍收手向前握固閉口鼻之氣想用心火下燒丹田覺熱極俯首擺撼左肩三十六右肩三十六想火自丹田透雙關入腦戶鼻引清氣閉少頃乃放直兩腳叉手向上托天按頂各九次然後放下以兩手向前攀腳心十二次乃收足端坐候口中津液所云逆水上也如無津照前法再漱再吞三度所得神水分三咽乃為九也咽下汩汩有聲百脈自勻暢擺肩並身二十四次再轉轆轤二十四次閉氣想丹田火自下而上遍燒身體魔消夢安寒暑災病皆不能入與乾坤合矣八段錦詩閉目冥心坐握固靜思神叩齒三十六兩手抱崑崙左右鳴天鼓二十四度聞微擺撼天柱赤龍攪水津漱津三十六神水滿口勻一口分三咽龍行虎自奔閉氣搓手熱背摩後精門盡此一口氣想火燒臍輪左右轆轤轉兩腳放舒伸叉手雙虛托低頭攀足頻以候逆水上再漱再吞津如此三度畢神水九次吞咽下汩汩響百脈自調勻河車搬運訖發火遍燒身邪魔不敢近夢寐不能昏寒暑不能入災病不能迍子後午前作造化合乾坤循環次第轉八卦是良因十六字一吸便提氣氣歸臍一提便咽水火相見此十六字仙家名十六錠金至易至簡妙訣也口中漱津三五次舌攪華池仍以舌抵上齶滿口生津咽下汩然有聲隨於鼻中吸清氣一口以意會及心寂地送至臍下一寸三分丹田之中略存一存謂之一吸隨用下部輕輕如忍大小便狀以意力提起使歸臍穿腎堂過夾脊陶道天柱風府玉枕透入泥丸其升而上如雲如露生津滿口氤氳氣衝謂之一呼一呼一吸謂之一息氣既上升隨又前汩然有聲咽下鼻吸清氣送至丹田稍存一存又收縮下部如前輕輕提上與臍相接而止而後覺沖和之氣徐徐上生升引如前所謂氣歸臍壽與天齊矣凡咽下口中有液為妙無液亦要汩然有聲積氣亦能生液也如是一咽一提或三五口或五七或十二或二十四要行即行止即止只要不忘久久行之長生可期又云在一陽動時尤宜急行然行鼻息而不得下部提縮之法與知提縮而不得鼻息往來之法皆非真傳也三字先以兩足盤坐雙手齊向頭頂托天隨放下疊在腹前叩齒三十六漱舌下泉以津滿為度咽下神氣安閒出入息微微於非心非口間持一靜字將靜暗念數千遍換一忘字暗念比靜字加倍又換一空字暗念比忘字又加倍自覺氣轉三車不可遏抑其動蕩形狀各出不窮此亦坐功最捷最簡法又有語豫者云系靜忘滅三字及質之陳白也乃知空字為妙此法即仙家皈依禪定時候也蓋於鬧熱場中討出靜中消息然知有靜非靜也貴能忘至忘到神化地位矣有忘便有不忘時不若一切皆空空中無所不變無所不化是為大乘六字噓呬呵吹呼嘻此六字也訣云肝若噓時目睜精肺知呬氣手雙擎心呵頂上連叉手腎吹抱取膝頭平脾病呼時須撮口三焦客熱臥嘻嚀十二字白虎隱於東方青龍潛於酉位此十二字訣也云轉輪法閉目靜坐叩齒咽津口中默念將十二字一字一圈作一圓圖如輪轉數至三十六遍止及至收回從外旋內從大至小念曰青龍潛於酉位白虎隱於東方亦三十六遍復歸太極而止是為一周天久則不必用意自然旋轉真有歇手不得處隨則坎腎離心交鉛屬坎汞屬離合二物黃至黃房戊己居中規中是也戊己真土也互相吞啖兩情留戀盤旋於祖竅之間自然復此先天之氣而成混元真一之精為大藥之根原作還丹之基本也玉芝云玄黃若也無交媾爭得陽從坎下飛乃作丹之大端修仙之第一義也然坎離龍虎交內交也乾坤子午交外交也內交者使龍虎歸於鼎中臍下情性合於竅內當用龍從火里出虎向水邊生之二訣始得龍虎交矣外交者以精氣神歸玄牝此與祖氣共竅竅中與祖氣聚會三家相見身心意合則三家相見合為一體凝於混沌抱一無離為返本還原之要道龍虎交而結嬰兒者此也七返九還立為洪壚大鼎以煉真內以養鉛汞外以象坎離運其陰陽驅龍馭虎以返本還原於是玄霜絳雪玉蕊金膏九轉而成寶矣離發乎坎下汞居乎水中上下之象也神居其中謂之三才道生於一一生二二生三三生萬物終始於一者也一者水也二者火也三者土也水火者各得其一者也得一者物之母故水生一男為坎名曰汞火生二女為離名曰鉛謂之四象汞丹也鉛藥也天老神君曰用鉛不用鉛須向鉛中作及至用鉛時用鉛還是錯何言之汞陽也子也鉛陰也母也汞無鉛則獨子不母何以生哉鉛汞合而三年為寶焚去鉛之氣是為脫殼其名曰純陽用鉛不用鉛也夫起火必於子何也承陽氣起火火力斯全過乎子則陰盛而火不然也經曰火起於臍下水出於鼎中既濟之象也吾有中宮之鼎在乎心之下即規中是鼎也時至卯則增鉛精也時至酉則增汞津也鉛不得火則不騰汞不得鉛則不凝經曰取水于山腦也起火於海臍也取汞於重樓採鉛於九天其運也備乎四時與神御之與氣和之於是四象具矣而中宮之鼎狀如雞子三年赤白判而換軀矣金腸玉骨出於五行其名曰蛻故四象交而汞干矣一陽備而鉛去矣其名曰還丹於是神魂立矣其體剛矣三花合一五彩歸陽夫是之謂無修之地昔純陽子問於正陽子曰何以謂之鉛與汞乎答曰鉛生於腎之左外玄內白水之正氣也居北方子位也陰中之陽也汞生腎之右外青內赤金之正氣也居南方午位陽中之陰也問曰火與水在於身何物為之乎曰下元真一之氣既極而成火起於臍之下者也水者出於腦者也火從下發如蒸釜焉此既濟之道也問曰鉛者靜也性也汞者動也命也果何所生曰五穀之真氣為心所竊化而為血血化為液液復化為真氣凝而為神此性也命居於二腎之中元海之內所出真元之氣其中有真水焉本生於心流於腎化而為精精者莫親於斯二者也曰脾謂之黃婆何也曰脾能接心之液腎之氣和合而成丹者也故云黃婆金液煉形形神妙而合道真何謂也曰鍊汞成神煉氣成形於是後生前咽二物合而成胎是謂與道合真斯金液煉形者也七返九還何謂也曰時自子而至申九轉也故煉者九年為一轉三轉為一周是故九煉而還丹一年益氣二年益血三年益脈四年益肉五年益髓六年益筋七年益骨八年益發九年益形九者既成其目點漆其膚凝脂其骨化玉其腸化筋白毫生於眉金光周於身行軼六驥洞視百步之外口鼻常有清香之味內行五臟者七竅也吾之真氣上下周流自申至於寅七返也一陰一陽一升一降一浮一沉精也髓也涕也唾也氣也液也津也晝夜存之而不走失者七返也採丹者何也曰滿口含津而搬歸於命府運氣於黃庭之中於是氣液造化而成精津積為血血積為珠珠為汞汞為砂砂為丹此為採丹者也三車何謂歟曰前後微脅者牛羊鹿車也胃脘者河車也天河也水府真一之氣從天內來通於口鼻故曰河車臍之下者火車也曰二泉孰生乎曰其出於口之中舌之下左右有二穴其大如針鋒通於心肺時有津液生於咽此潤萬物而濡五臟者也純陽子既聞要道於是發玄鍵而知八漏之禁也目之淚走者肝漏鼻之涕走者肺漏口之唾走者腎漏外腎之汗走者心漏夜而盜汗者小腸漏寢而有涎者腦漏夢與鬼淫者神漏淫欲者身漏是八者能固使入於金鼎玉池聚之以為鉛汞其可度乎能取津於玄膺入於明堂溉於喉下有還丹則必上烹元液使陰盡而陽生火抽而水添循環而不止何以取津乎攪漱舌之下則波濤自滿咽之則注于丹海矣大功欲成者其邪關外塞命關中開乎肺者主乎榮衛二氣其在於腎是為金水相生父子之道也行三十咽於玉池則百脈通而血液滋矣此七返者也何云乎騰腦成云降口成水傳肺成唾傳心成血傳肝成精傳脾成液傳腎則成二脈而為陰精陽粹者也金津玉液者陰陽之所生也夫能上經七返傳入於二腎下變九還傳至於腦上下往來而不息則元氣充實八素之液流通其腎受精貫於五內更九九之真火氣滿候足而金丹成矣行七轉九還則可以辟穀舌下泉此不飢之藥也即初學之士但能閉目靜坐終日不見一人不飲不食時以舌抵上齶攪上下齒內外取舌下泉滿口即咽下咽後又以前法行之愈行愈覺精神每晝夜計行五百度腹中自然不飢其間覺有神明之通大丹之成如在數日光景快樂不可名狀此云休糧訣也故曰華池神水玉汞金鉛乾坤運用日月烹煎屯蒙發火進退精研抽添沐浴九轉一年坎浹離通功行三千持之勿怠化形為仙袁了凡靜功訣凡靜坐不拘全跏半跏隨便而坐平直其身縱任其體當令關節相應不倚不曲解衣緩帶稍有不安微動取便務使調適初時從動入靜氣或未平舉舌四五過口微微吐氣鼻微微納之多則三四五遍但取氣平為度舌抵上齶唇齒相著次漸平視徐徐閉目勿令眼瞼大急常使眼中朧朧然次則調息不粗不喘令和細綿綿天台禪門口訣止教調息觀臍息之出入皆根於臍一心締觀若有外念攝之令還綿綿密密努力精進自此而後靜中光景種種奇特皆須識破庶可進修初時有二種住心之相人心泊境妄念遷流如火熠熠未嘗暫止因前修習心漸虛凝不復緣念名利冤親等事此名粗心息也外事雖不緣念而此心微細流注剎那不停愈凝愈細內外雙泯此名細心住也此後有二種定法當此細心住時必有持身法起此法發時身心自然正直坐不疲倦如物持身於覺心自然明淨與定相應定法持身任運不動從淺入深無分散意此名欲界定也後復身心泯虛豁忽然失於欲界坐中不見己身及床坐等物猶若虛空此名未到地定也從此證十六觸一動二癢三涼四暖五輕六重七澀八滑復有八觸謂一掉二猗三冷四熱五浮六沉七堅八軟此八觸與前八觸雖相似而細辨則不同合為十六觸也十六觸由四大而發地中四者沉重堅澀水中四者涼暖軟滑火中四者暖熱猗癢風中四者動掉輕浮學者於未到地中入定漸深身心虛寂不見內外或經一日乃至七日或一月乃至一年若定心不壞守護增長此時動觸一發忽見身心凝然運運而動當動之時還覺漸漸有身如雲如影或從上發或從下發或從腰發漸漸遍身上發多退下發多進動觸發時功德無量略言十種善法與動俱發一定二空三明淨四喜悅五樂六善生七知見明八無纍解脫九境界現前十心調柔軟如是一日或十日或一月一年長短不定此事既過復有餘觸次第而起有遍發十六觸者有發三四觸及七八觸者皆有善法功德如前動觸中說此是色界清淨之身在欲界身中粗細相違故有諸觸證初有五境一覺二觀三喜四樂五定心也初心覺悟為覺後細心分別為觀慶悅之心為喜恬淡之心為樂寂然不散為定心十六觸中皆有此五境第六又有默然心由五境而發者皆初禪所發之相也夫覺如大寐得醒如貧得寶藏末世諸賢以覺悟為極則事然欲入二禪則有覺有悟皆為患病學者於初禪第六默然心中厭離覺觀初禪為下若知二法動亂逼惱定心從覺觀生喜樂定等故為粗此覺觀法障二禪內淨學者既知初禪之過障於二禪今欲遠離常依三法一不受不著故得離二訶責故得離三觀析故得離由此三法可以離初禪覺觀之過覺觀既滅五境及默然心悉謝已離初禪二禪未生於其中間亦有定法可得名禪但不牢固無善境扶助之法諸師多說為轉寂心謂轉初禪默然也在此定中須依六行觀厭下有三曰苦曰粗曰障欣上有三曰勝曰妙曰出約言之只是訶贊二意耳夫玄門三年溫養九年面壁未嘗不靜坐而不發大智慧不發大神通不發深禪空者以其處處戀著也得一境界即自以為奇特愛戀不捨安能上進故須節節說破事事指明方不耽著方肯厭下欣上離苦而求勝去粗而即妙舍障而得出到此地位方知法有正傳昔陳白沙靜坐詩云劉郎莫記歸時路只許劉郎一度來陳公在江門靜坐二十餘年惜無明師指點靜中見一端倪發露即愛戀之已而並此端倪亦失竭力追尋不復可見故其詩意云爾學者靜中有得先須知此六行觀若到初禪不用此觀則多生憂悔憂悔心生永不發二禪乃至轉寂亦失或時還更發初禪或並初禪亦失所謂為山九仞一簣為難切當自慎學者心不憂悔一心加功專精不止其心淡然澄靜無有分散名未到地即是二禪前方便定也經云不失不退其心豁然明淨皎潔定心與喜俱發亦如人從暗中出見外日月光明其心豁然明亮內淨十種功德俱發具如初禪發相但以從內淨定俱發為異耳二禪有四境一內淨二喜三樂四定心何名內淨遠而言之對外塵故說內淨近而言之對內垢故說內淨初禪中得觸樂時觸是身識相應故名外淨二禪心識相應故名內淨初禪心為覺觀所動故名內垢二禪心無覺觀之垢故名內淨既離覺觀依內淨心發定皎潔分明無有垢穢此內淨定相也喜者深心自慶於內心生喜定等十種功德善法故悅豫無量也樂者受喜中之樂恬淡悅怡綿綿美快也初禪之喜樂由覺觀而生與身識相應此中喜樂從內心生與意識相應所以名同而實異定心者受樂心忘既不緣定內喜樂復不緣外念思想一心不動也此四境後亦有默然心但比初禪更深耳謂之聖默然定欲進三禪又當訶二禪之過此二禪定雖從內淨而發但大喜湧動定不牢固當即捨棄如上用三法遣之一不受二訶責三觀心窮檢既不受喜喜及默然自謝而三禪未生一意精進其心湛然不加功力心自澄淨即是三禪未到地於後其心泯然入定然入定不依內外與樂俱發當樂發時亦有十種功德具如前說但無湧動之喜為異耳綿綿之樂從內心而發心樂妙美不可為喻樂定初生既未即遍身中間多有三過一者樂定既淺其心沉沒少有智慧之用二者樂定微少心智勇發故不安穩三者樂定之心與慧力等綿綿美妙多生貪著其心迷醉故經言此樂惟聖人能捨餘人舍為難有此三過則樂定不得增長充滿其身學者須善調適亦三法治之一者心若沉沒當用意精進二者若心勇發當念三味定法攝之三者心若迷醉當念後樂及諸勝妙法門以自醒悟令心不著若能如是樂法必定增長遍滿身分百骸萬竅悉皆欣悅按初禪之樂從外而發外識相應內樂不滿二禪之樂雖從內發然從喜而生喜根相應樂根不相應樂依喜生喜尚不遍況於樂乎三禪之樂從內發以樂為主遍身內外充滿恬愈亦有五境一舍二念三智四樂五定心也舍者舍前喜心並離三過也念者既得三禪之樂念用三法守護令樂增長也智者善巧三法離三過也樂者快樂遍身受也定心者受樂心息一心寂定也欲得四禪又當訶斥三禪之樂初欲得樂一心勤求大為辛苦既得守護愛著亦為苦一旦失壞則復受苦學者既深見三禪樂有大苦之患應一心厭離求四禪種不動定爾時亦當修六行及三法除遣即三禪謝滅而四禪未到修行不止得入未到地定心無動散即四禪方便定於後其心豁然開發定心安穩出入息斷定發之時與舍俱生無苦無樂空明寂靜善法相扶類如前說但無喜樂動靜為異耳爾時心如明鏡不動亦如淨水無波絶諸亂想正念堅固猶如虛空學者住是定中心不依善亦不附惡無所依倚無形無質亦有四境一不苦不樂二舍三念清淨四定心也此禪初發與舍受俱發舍受之心不與苦樂相應故言不苦不樂既得不苦不樂定舍勝樂不生厭悔故云舍禪定分明智慧照了故云念清淨定心寂靜雖對衆緣心無動念故名定心此後亦有默然心如前說也又此四禪心常清淨亦名不動定亦名不動智慧於此禪中學一切事皆得成就學神通則得學變化則得故經說佛於四禪為根本也外道服食勤煉遠望延年勞形弊骨萬舉萬敗間有成者自負深玄豈知造業爭如求禪一切變化無不立就轉粗形為妙質易短壽為長年特其細耳從此後又有四定一空處定二識處定三無有處定四非有想非無想處定學者至四禪時有視為微妙得少為足畫而不進者有覺心識主滅虛誑不實便欲求涅槃寂靜常樂者不遇明師指授不知破色與斷色系縛之方直強泯其心斷諸思慮久久得心無憶念謂證涅槃既未斷色系縛若捨命時即生無想天中此為大錯故須求空處定應深思色法之咎若有身色則內有飢渴疾病大小便利臭穢弊惡等苦外受寒熱刀杖刑罰毀謗等苦從先世因緣和合報得此身即是種種衆苦之本不可保愛復思一切色法系縛於心不得自在即是心之牢獄令心受惱無可貪戀由是求滅色之法須滅三種色一滅可見有對色二滅不可見有對色三滅不可見無對色經言過一切色相滅有對相不念種種相過一切色相者破可見有對色也滅有對相者破不可見有對色也不念種種相者破不可見無對色也學者於四禪中一心締觀己身一切毛道及九孔身內空處悉皆虛疏猶如羅縠內外相通亦如芭蕉重重無實作是觀時即便得見既得見已更細心觀察見身如篵如甑如蜘蛛網漸漸微末身分皆盡不見於身及五根等內身既盡外道亦空如是觀時眼見色源故名過色耳聲鼻臭舌味身觸覺壞故名有對相於二種余色及無數色種種不分別故名不念種種相一切色法既滅一心緣空念空不捨即色定便謝而空定未發亦有中間禪爾時慎勿憂悔勤加精進一心念空當度色難於後豁然與空相應其心明淨不苦不樂益更增長於深定中唯見虛空無諸色相雖緣無邊虛空心無分散既無色縛心識澄靜無礙自在如鳥之出籠飛騰自在此為得空處定也從空緣識學者當知虛空是外法入定定從安穩識處是內法緣內入定則多寧謐觀緣識之受想行識如病如癰如瘡如刺無常苦空無我和合而有欺誑不實一心系緣在識念念不離未來過去亦復如是常念於識欲得與識相應加功專至不計旬月即便泯然任運自住識緣因此後豁然與識相應心定不動而於定中不見餘事惟見現在心識念念不住定心分明識慮廣闊無量無邊亦於定中憶過去已滅之識無量無邊及未來應起之識亦無量無邊悉現定中識法持心無分散意此定安穩清淨心識明利為得識處定也從此而進又思前緣空入定是為外定今緣識入定是為內定而依內依外皆非寂靜若依內心以心緣心入定者此定已依三世心生不為真實惟有無心識處心無依倚乃名安穩於是又觀緣識之受想行識如病如癰如瘡如刺無常苦空無我和合而有虛誑不實即舍識處繫心無所有處內靜息求不同一切心識之法知無所有法非空非識無為法塵無有分別如是知已靜息其心惟念無所有法其時識定即謝無所有定未發於其中間亦有證相學者心不憂悔專精不懈一心內淨實無所依不見諸法心無動搖此為證無所有處定也入此定時怡然寂絶諸想不起尚不見心相何況余法從此而進又復上求訶責無所有定如癡如醉如眠如暗無明覆蔽無所覺了無可愛樂觀於識處如瘡如箭觀於無所有處如醉如癡皆是心病非真寂靜亦如前法離而棄之更求非有想非無想定前識處是有想無所有處是無想今雙離之即便觀於非有非無何法非有謂心非有何以故過去現在未來求之都不可得無有形相亦無處所當知非有云何非無無者是何物乎為心是無乎為離心是無乎若心是無則無覺無緣不名為心若心非無更無別無何也無不自無破有說無無有則無無矣故言非有非無如是觀時不見有無一心緣中不念餘事於後忽然真實定發不見有無相熊泯然寂絶心無動搖恬然清淨如涅槃相是定微妙三界無過證之者咸謂是中道定相涅槃常樂我淨愛著是法更不修習如蟲行至樹表更不復進謂樹外無高可憫也殊不知此定雖無粗煩惱而亦有十種細煩惱凡夫不知誤謂真實世間外道入此定中不見有無而覺有能知非有非無之心謂是真神不滅若有明師傳授方知是四陰和合而有自性虛誑不實從此不受不著即破無明入滅受想定獲阿羅漢果是謂九次第定也大抵初禪離欲界入色界二三四禪皆色界攝四定離色界入無色界滅受想定則出三界證阿羅漢果生淨土此非閉息導引坎離成丹之所及蓋能成大仙然後能學佛此之謂也靜坐之訣原出禪門吾儒無有也人自有生來終日馳驟逐物忘歸動固紛紛靜亦擾擾稍加收攝便覺朗然中間曲折無明師指授不得肯綮或得少為足或反成疾患不可不知所適從也凡靜功先須辨志志一差即墮邪徑如學者為名聞利養而靜坐如為志氣昏愚欲聰明勝人而靜坐如為塵勞苦報慕為善安樂而靜坐如為千生萬劫生死未了求得正道而靜坐真正修行者發大願心如楞嚴經云有一衆生不成佛永不於此取泥洹又云將此身心奉塵剎所以菩薩修行身雖暫舍衆生而心常悲憫於閒靜處服禪定藥得實智慧除煩惱起六神通廣度衆生即如儒者隱居豈潔己忘世哉正為求萬物一體之志耳古語云靜處養氣鬧處煉神金不得火煉則雜類不盡心不得事煉則私欲不除苟能調和氣息收斂元神動中習存應中習止立則如齊手足端嚴行則徐徐步與心應言則安和勿使躁妄一切運用皆務端詳閒泰勿使有妄想妄為妄行諸疾又何益非靜功哉紀驗考古以凡人血脈有未和因治藥調齊之苟非慎於物其用無驗蓋慎物齊也齊即劑也劑以取驗驗而出如黃帝時桐君逮北齊徐司徒唐英司空孟刺史處如華他弟子李當之逮梁陶隱居唐孫思邈諸先賢指不勝屈大抵以驗傳以書傳一藥用生死系焉何可以人性命嘗試乎豫於醫深明慎物之義每視一至愚者至賤者未嘗不畢豫調齊之力及遇尊貴亦猶是慎物以行之而醫同而驗同非如世醫視富貴與貧賤殊方用藥時已心戰手棘安能取驗豈知得慎物之義正未始不同未始不異哉豫以事閉門益求醫理無何而疾病相呼驗其一又驗其十轍將不停時在省更多中有奇驗諸方皆按症創用非舊本所有因之取所奇驗付之剞劂有紀驗集而後及於症辨而後及於脈辨而後及於祕方靜功故是集以紀驗為之首紀驗陳部堂諱泰號禮部左侍郎時統大兵入閩駐營南臺己丑仲夏偶傷寒症至八日忽眼黑直視身冷卒倒有欲用薑湯灌之豫曰非也夫因氣暴逆而致然者可用薑湯蘇合丸等藥今部堂兩手熱極此心火也體肥房勞暑氣相觸腎水下虧心火上炎宜黃連宜參以藥二味投之立效藥方川黃連一錢薑汁炒人參七分水一碗煎五分渣再煎祖部堂諱澤遠號清淵禮部左侍郎統大兵入閩己丑夏得痢疾每晝夜行七八十次其疼不可言便出僅血膿數點飲食概不進瘦弱已極如此者月餘諸醫咸慮之以為此毒氣薰蒸清道致胃口遏塞聞食即吐凶兆也豫按症面熱身涼脈大而滑夫病久則邪氣日盛當身熱而今身涼身涼不宜脈大而今脈大細視胃脈乍大乍細豫豁然曰此非噤口之症也因感寒不發散故胃以上有積寒冒暑不清涼故胃以下有積熱宜以熱藥開胃口之寒以涼藥通穀道之熱久病虛甚補之服此藥當兩日能飲三日能食四五日進葷膻易易耳聞者大驚及進藥一服當夜減病之半次夜僅行八九次三服則神氣漸旺飲食漸進五六日而愈矣藥方白豆蔻仁一錢乾薑煨一錢黃連吳茱萸制一錢黃芩薑汁炒一錢白朮陳壁土炒八分人參大南棗包煨八分加黑棗一枚水一碗半煎七分日進二劑佟中丞諱國鼎號懷東時巡撫福建戊子冬偶一日早膳時神氣正爽命豫視脈豫忽訝曰據脈已受寒六日今夜半後交七日當發發則輕僅七閲日可愈若遲一日二日則加重時同席者不之信即撫臺亦以為未必然因命豫整一方俟其驗及是夜果發發即以其方進九閲日而全康即十神湯張中丞諱學聖號捷庵巡撫閩省己丑夏命豫視脈並不言及病由豫細診曰此脈有異當有濕症濕在脾宜嘔吐麻木然此濕又有異以濕居中而上與下不通氣日動則血運而氣隨之可無患若夜靜則有下半身痠麻之症陰易動濕也雨天尤甚張撫臺曰果有此症豫曰嘔吐亦有異以濕氣中隔飲則氣屬陽易行下胸膈俱爽食則氣屬陰硬物難下略停滯即作逆而為噁心而為痰涎法當通脾氣為主使其氣下行則無痿痹之患進湯藥四服又進以丸方而痠麻療矣閲數月又進以歸茸膏而嘔吐全療矣藥方蒼朮泔浸炒一錢藿香葉一錢白朮泔浸陳土炒一錢木香五分小茴香微炒五分茵陳葉酒炒一錢加煨姜二片水一碗半煎七分食前服歸茸膏當歸一斤酒洗淨用好冬酒浸一宿鹿茸一斤酒洗淨切片用好紅酒浸一宿麥門冬半斤水浸去心白茯苓四兩水浸去心白朮四兩米泔水洗切片陳壁土炒人參四兩木香二兩揀淨為末白豆蔻二兩去殼為末甘草二兩為末蘿蔔子二兩微炒為末川貝母二兩去心為末砂仁二兩為末沒藥一兩為末麝三分與貝沒共為極細末上將歸鹿麥茯朮參六味入銅鍋用清泉水浮藥上八寸許熬至寸許又沖水浮藥上四寸熬至寸許取起用絹袋濾淨入木豆甘蘿砂五味末藥微火熬成濃汁用絲綿濾淨入煉蜜一斤用桑條攪不住手入水成珠不散為度磁瓶封好水中浸五晝夜去火氣每清晨與臨睡用白滾湯調服隨意多寡或夜間臥後銜口中自化此膏補心血升腎水健脾胃清痰理氣久服卻病延年返老還童區區治嘔吐噁心嘈雜等症又其餘也楊提督諱名高號幼涵提督八閩兼溫州府己丑秋初入關即得恙屢醫服藥至延平豫視脈曰此非時恙也內有熱毒未得遽泄因發為寒熱飲食不進醫者不知復用補脾暖精收汗益氣之藥以至陰囊瘡痕黑如漆不知痛癢此為毒氣收入內也甚足慮幸豫知此症整藥服之始而遍身發痛繼而發癢閲半月而毒瘡發矣兩月全愈多方不能盡載霍按臺諱達號魯齊時巡方福省己丑初秋暑熱得一症遍身俱疼乍寒乍熱上欲吐不吐下欲瀉不瀉兼有隔一日瘧症諸醫以為冒暑熱在內不得出多用香薷益元散不惟無效且加重豫視脈曰此積寒也非冒暑也積寒並與冒寒異感冒之症隨感即發毛竅既寒安禁熱蒸積寒者或飲食後或睡中或易衣今日微寒入內明日又微寒入內或因多用酒暫解閲數日又微寒入內及暑氣相觸遂至病發此為寒在臟腑熱在皮膚用辛熱之藥以去寒寒去則吐瀉止而遍體快矣次用小柴胡加減以祛瘧數劑全康藥方乾薑肉桂陳皮柴胡茯苓半夏白芍甘草加黑棗二枚水一碗半煎七分杭主考諱齊蘇號東侯吏科給事中時典試閩闈向有鬱血症欲吐不吐最難忍戊子秋閲卷勞心發甚重出闈豫視脈用藥立效時一使半月前忽腿疼兩腳筋縮腳根縮黏至腿寸步不能行將一月屢藥無效咸以此為痿痹症豫曰非也察其脈左寸忽洪忽澀遲數無定棲因此人好飲冷酒酒新熱燥冷飲寒濕寒熱相摶遂有此病以四味藥為末頭晚進一服次晨即能行動三服全愈散藥方白蒺藜一錢炒去刺酒蒸熟焙乾為末川烏二錢去皮臍為末麻黃二錢二股梢一股根為末蒼朮一錢甘草汁拌炒為末每服一錢二分用老酒熱沖服被厚蓋出汗自干丁方伯諱文盛號瑞軒福省藩司夫人己丑冬因水土不服胸膈氣逆飲食不進諸藥無效整方偶痊兩日復發如噎膈然甚至喉間不能通氣豫視脈悟曰昔賢有云氣大逆遏塞之甚者其氣挾火畏用熟藥須以生藥磨服之豫整藥二味一服而愈藥方檳榔五錢枳殼七錢用涼水生磨沖服何道尊諱平號匡山福省糧道夫人時恙後遍身痠疼胸腹膨脹飲食不進時發寒熱諸醫作不足進藥無驗豫視脈曰此非不足之症乃邪氣未散傳入經絡上焦有火當用通氣清涼之劑三服而愈藥方羌活一錢防風八分升麻七分柴胡七分白豆蔻仁六分黃柏酒炒七分桑白皮六分青皮五分白茯苓七分炙甘草三分煎照常顧道尊諱礽號南金建南道丁亥秋得痢症至冬尚未痊豫視脈曰非痢也此必由食冷物寒入脾虛入腎但以痢藥投之無濟也果因多食藕從噁心起不進飲食遂至瀉成痢投藥數劑而愈藥方當歸一錢懷地八分白芍八分益智仁一錢砂仁六分白茯苓一錢陳皮七分甘草三分水一鍾半加姜二片煎七分黃道尊諱鼎象號商侯建南道己丑初秋患瘧三日一發每日事甚煩而年又高瘧月餘飲食不能進體瘦脾弱每藥無效豫視脈曰三日一發有熱無寒裡實不泄手足熱而欲嘔此陰氣弱而陽氣獨發也謂之疸瘧且自午漸酉漸亥轉陰也為水氣不交腎虛也法當用升而醫家多用黃芩等藥宜乎日益弱矣豫用升陽飲加減次用神截丸漸愈藥方人參一錢白茯苓一錢白朮泔浸土炒一錢藿香葉一錢升麻八分青皮八分何首烏一錢甘草四分加煨姜二片黑棗二枚水一碗半煎七分神截丸白朮八兩米泔水浸一宿陳壁土炒乾去土淨分作四股一股用柴胡二兩煎濃拌曬乾一股用常山二兩酒煎濃汁拌曬一股用人參一兩煎濃汁拌曬一股用青皮二兩煎濃汁拌曬無日焙乾用豆粉煮薄糊為丸如梧子大早晚溫湯吞六十丸但此方最妙在衆截藥不效然後用之朱方伯諱鼎新號爾健時福省藩司丁亥秋患失音症諸醫皆以風熱痰火用清涼散為主每服無效豫視脈曰此不當作失音論也因腎水不升心血不足偶冒風寒不知表散遂至肺竅閉塞整一方服之三日而氣通五六日而音通矣藥方當歸二錢生地二錢人參八分石菖蒲一錢六分白茯苓一錢六分核桃肉二錢用水五大碗煎三大碗不拘溫冷不論飲食前後每清晨至午服完將渣再煎一大碗臨睡服朱道尊諱正源號靜之閩省屯鹽道戊子冬偶恙兩日旋愈方在奕棋豫視脈曰未也此感重發輕內邪更伏稽其驗當在四日後發發則寒熱交作頭痛骨酸背疼腰強傳經不已重傷寒也知病根早治之須十四日可愈不則未可知矣閲三日果發悉如豫言整方服之二十日全愈方載傷寒門鄭副總諱爾任號沖宇松溪鎮守丁亥秋有血虛胃弱之症豫治藥遂驗時寓所有一少年新娶得陰症至六日卒倒遍體俱冷其父母為化紙置棺但胸前氣微溫鼻中似有息出夜二鼓因鄭副總求救於豫豫曰此火症也痰閉不醒當兩手脈俱伏而兩腳大趾必微熱者又必醫生認為陰厥凶症誤用附子諸熱藥益速其重因與藥一服吹入喉即醒再一服而愈藥方細辛三分薄荷五分人參三分羌活五分共用絲纏好入大棗肉中燒灰存性為細末先用少許吹入喉間次用溫水調沖服張六三諱法拭𫵻安令丁亥秋偶時恙為治藥愈有乃弟張二官病甚重飲食不進瘦弱氣欲絶三閲月似不可藥豫視脈曰爾脈不過無力弱極何沉篤至此無他病必有邪驚拜屏人語豫曰真仙醫也實為在署內遇一美婦伴睡二月餘心知其妖欲卻之不能殆登鬼録矣何以救我豫整一方與之旬日而愈此方近誕不載戴山芝諱廷徽建陽縣令戊子冬看脈腎水最弱交女即泄精冷極豫整一方服之不多日而交能堅精出覺有熱氣女果孕矣丸方沙苑蒺藜六兩酒浸一宿瓦上焙乾懷大地六兩酒浸三宿煮一日多用酒黑爛為度鹿茸四兩酒浸三宿酒十斤煮半日炒乾川續斷四兩石棗肉四兩牡丹皮三兩川杜仲四兩一半鹽水炒一半薑汁炒白附子二兩麵包煨去皮臍白菖蒲二兩白茯苓三兩去皮水淘去絲膜曬乾人乳拌蒸川牛膝三兩酒浸蒸焙乾乳香五錢沒藥五錢人參二兩煉蜜丸梧子大每清晨白滾湯吞五六十丸李九齡諱之龍沙縣令戊子夏得恙秋盡未愈瘦如柴兩腳不能立豫視脈曰此邪入經絡故晝熱少夜熱多遍身痠疼胸膈有鬱火氣弱血虛症也整一方服之旬日而愈藥方生地黃酒洗炒八分蒲黃八分川黃連薑汁炒五分當歸酒洗去土一錢柴胡去蘆七分羌活七分桃仁四分甘草梢炙四分加燈草二分水一碗半煎七分滿州將官黑得喇己丑秋患白痢兩月腹痛不可忍若進飲食更痛氣將絶豫視脈曰此有飲食之毒因虛弱不能發是以痛極整一鵝蛋藥與之兩日而愈藥方用大鵝蛋一個將蛋頂錐一孔入人參末五分川烏末五分雄黃五分麝香半分攪勻用綿紙浸濕裹十層外用陳壁土調濕包好其孔上多用泥火煨三個時取出用布包蛋以線縛沉井底一宿取開好燒酒調服一秀才陳啓忠患病後只飲食便作嘔每一餐必吐盡方止輒思飲食食後又復如是一年餘羸弱不可言諸藥不效咸云死症豫視脈曰此傷寒愈後不服補中益氣湯胃虛症也用丁香茱萸湯加減兩服而飲食通十服全愈藥方丁香炙甘草柴胡升麻人參黃耆吳茱萸草豆蔻當歸身蒼朮各六分黃柏肉桂各四分加黑棗二枚水一碗半煎七分何道尊諱敦季號胤伯先署漳南道後署福寧道庚寅春寓所有王友自頭年夏得傷寒症愈後成瘧至冬月瘧愈頭痛不可忍羸弱不進飲食晝夜不得眠者數月藥無效豫視脈曰此傷寒不清理小便聚火不得行其毒上升結頭頂豫以清便藥與之一服而睡數服而愈藥方生地黃木通蒲黃車前子通草歸尾白茯苓澤瀉檳榔甘草鄭道尊諱清號介臣福省兵道素患牙疼症疼不可言其氣流入肩即肩成腫諸醫認為火多用涼藥其疼益甚經五年餘庚寅春豫視脈曰此風入肝濕宜用散風次乃降火數日見功矣鄭道臺以牙疼戒酒飲即疼發豫以末藥三服用酒儘量表汗多飲減疼其患漸愈末藥方羌活一錢附子一錢麻黃五分共為細末作三服好酒熱沖儘量出汗為度湯藥方荊芥一錢梔子童便炒一錢淡竹葉一錢石膏二錢大黃二錢薄荷一錢白芷八分連翹八分白茯苓八分甘草三分水一碗半煎七分周道尊諱之翰號申公漳南道素患心前有一塊埂如拳每睡後欲起似乎有壓之者心神不寧飲食難化如此數年諸藥無效豫視脈曰此非氣之為也彼醫不知認中脘痞塞飽悶為脾氣盛誤已此因心事不快或煩惱時借房事消遣是以未行房先胸中似有物既行房後竟成一物名鬱火也制丸藥半月而愈丸方浙腿術二兩米泔水浸一宿陳壁土炒去油白豆蔻一兩麥門冬二兩去心新瓦焙乾青皮一兩枳實麵炒一兩北芥子炒一兩川黃連吳茱萸制一兩砂仁微炒五錢南木香五錢川厚朴姜炒一兩白茯苓一兩人參一兩地骨皮一兩蒼朮一兩米泔水浸一宿炒知母一兩甘草五錢甘枸杞一兩共為末陳米用薄荷葉湯煮粥為丸梧子大每空心淡鹽湯吞二錢佟撫臺命豫視一將官脈其症則頭眩體弱手足拘攣飲食不進藥無效豫細察脈曰此有鬱血在胸當因損致然若此血得出其病立愈不則難療也用末藥一服覺病益重二服欲嘔三服始吐出紫血一口繼吐出黑血六七塊其病立愈末藥方生陳皮末二錢生附子末二錢生大黃末二錢生乾薑末一錢共為細末用好陳酒熱沖儘量服之蘇州商人何鳳宇患病十餘日目黃身腫胸前結塞不能通氣每脹悶則目睛上視一個時不能轉醫者未審何症但用寬胸理氣藥益增重豫視脈曰此傷寒熱邪傳裡凶症也遲之又久藥力亦無施矣急取黑骨雄雞白毛者去肚內雜物切開先用陳皮枳殼末各五分攤腹胸將雞才切即貼上半個時腹中微響邪即轉動頓覺爽快矣服煎藥三日而愈藥方川黃連薑汁炒一錢知母一錢石膏三錢黃芩一錢山梔童便炒八分麥門冬去心八分五味子八分香豉一合水一碗半煎八分楊提督標下一將官病久不愈時九月初舟中甚熱脹悶不可忍米飲不能下將垂絶矣豫視脈曰此非熱症也風邪未經清表乘虛作脹涼藥服之加重即溫藥而溫服之亦無濟也當用湯藥候冰冷數服而愈藥方麥門冬去心二錢白蒺藜炒去刺二錢生地黃二錢白茯苓二錢人參五分用水四碗煎至二碗半候冰冷不時服之祖部堂標下一將官病月餘頭眩口瘡喉痛下瀉偶一二日作痢旋愈復瀉閲數日又痢而喉腫又不進飲食偶進食旋吐服藥益吐豫視脈曰此虛極腎水不升脾土不能勝當進以益精補脾之藥喉痛口瘡此邪火不足慮也整一丸方十日全愈丸藥方人參一兩硃砂水飛三錢白朮米泔水浸一宿陳壁土炒二兩白茯苓去皮一兩黃耆蜜炙一兩白芍藥一兩當歸酒洗一兩陳皮一兩煉蜜為丸梧子大每日進三次白滾湯每次一錢李部堂標下一將官患傷寒症頭疼發熱惡寒遍身作痛屢發無汗其症不變而病日益重諸醫加以發表遂至癲狂腹痛欲絶豫視脈曰此無陽凶症也豈有陽虛而能汗者整一方與之立效藥方防風羌活細辛川芎桂枝白芍熟附柴胡各等分人參六分甘草三分加黑棗一枚水一碗半煎七分陳部堂標下一將官每便撒血不止腹微痛即有血行行即痛止如此十數年藥無效羸瘦不堪豫視脈曰此脾濕引熱也整一丸方與之脾氣既健血自歸經其病全愈藥方生地三兩酒浸三宿多用酒煮一日黑爛為度陳皮一兩蒼朮二兩米泔水浸七日炒川黃連二兩吳茱萸制藿香葉三兩升麻二兩川厚朴二兩炒白朮三兩米泔水浸一宿陳壁土炒薏仁三兩炒當歸二兩酒洗槐花三兩煉蜜為丸梧子大每清晨白滾湯吞二錢臨睡一錢馬成垣諱鑣鎮守浦城中軍一家丁每夜發熱晝則發寒其畏寒有大異者見人持扇即毛竅發戰見人談及風字即口噤不能言飲食夜或可進晝則概不入也醫者多用熱劑病益甚豫視脈曰此內熱極而外怯寒也由感寒病後不清表結成胃火整藥與之二服而愈末藥方益元散五錢川黃連三錢薑汁炒陳皮二錢共為散末作二服米湯吞下一友林大年目腫疾愈後但昏黑不能明忽疼而止移時復然豫視脈曰此多服涼藥竅塞血枯大患雖去而血不能通竅遂至昏花血無時不生竅欲通而復閉故忽然疼也整方與之三服而愈藥方當歸枸杞黃耆細辛白茯苓升麻蔓荊各等分甘草食後服一友黃涵素九日登高回忽腹中微痛醫者進以香砂等藥漸加痛又服藥益痛不可忍至五六日幾痛絶口不能言豫視脈曰此脈無恙必腹中有毒物整方與之一服而愈末藥方明雄黃一錢沒藥七分乳香七分麝香二分白芷一錢皂角刺七分共為末沖陳酒五斤封好不拘冷熱隨意飲盡即愈一友俞成伯陰症因自知醫先用理中湯後益腹疼氣冷用三建湯等熱藥囊愈縮不能言語將危矣豫視脈曰此當先通其氣氣通則陽起起陽之藥有祕法不專在天雄附子也整一方與之一服而愈藥方烏骨雄雞燥糞五錢鼠糞五錢陳皮三錢韭菜五錢先將雞糞鼠糞炒黃次入陳皮同炒沖陳酒一碗入鍋一滾將韭衝下熱服徽商汪鳳溪病三四日後只腹痛不能忍諸藥無效一日疼甚眼直卒倒豫視脈曰此傷寒蓄血症也以井水半碗飲之其病稍止即能言云冷入快極用藥下之即愈藥方桂枝一錢枳實七分大黃二錢石膏一錢柴胡八分甘草四分加姜二片棗一枚水一碗煎八分一友方玉玄有頭痛症日夜不得眠惟進飲湯稍可食即痛難堪數年求醫不得效豫視脈曰此邪火上聚進飲湯稍可全屬陰邪飲者陽氣陽入則陰散也湯藥無效用洗藥五日而愈洗藥方羌活二兩甘草二兩薄荷一兩升麻一兩作一服水六碗煎至二碗用布浸乘熱洗上如冷又煎熱再洗自晨至晚洗有三個時夜則不用以養陽氣也五服全愈童旗鼓諱育秀號賢齊提督旗鼓己丑冬得感冒甚重妄用藥遂熱蒸欲狂解衣揚被腹脹胸疼飲食不進不省人事成凶症豫視脈曰此飲食勞役過傷內症也用藥一劑瀉其毒熱次用半表半裡劑二服而成瘧症漸愈矣藥方柴胡黃芩大黃枳殼赤芍朴硝加姜三片水一碗半煎八分次藥方人參陳皮黃芩貝母知母茯苓煎照前一友莆田戴一甫患眼疾不能視物二年餘諸藥無效庚寅春豫視脈曰此因勞損心血肝木主筋血侵筋故赤筋侵睛久則腎益虛而肝木生風流淚無窮益增昏黑矣整方服之五日見物十日復明藥方防風荊芥薄荷家白菊各一錢石決明蟬蛻生大地白茯苓各八分人參五分甘草三分水一碗煎七分鄒副總諱必科號聘之撫院大廳患頭眩兩目黃赤四肢無力飲食不進諸醫多用補藥病勢益重豫視脈曰風邪未清如何用補目赤頭眩者火也四肢無力者邪入筋絡也飲食不進者用補藥氣扼也整一方四服而愈藥方薄荷荊芥牛蒡子麥門冬去心膽南星黃柏知母干菊茯苓各等分甘草四分加姜二片水一碗半煎七分王副總諱進號翠芝福省城守初患傷寒豫整藥二服隨痊因不忌口成瘧復不忌口重不可言醫者以其病久多議服補虛健脾之藥豫視脈曰此傷寒勞復因瘧後血氣未平尚有餘熱隨多食發怒勞力勞神用小柴胡加減數劑而愈藥方柴胡人參半夏曲川厚朴白朮白茯苓陳皮澤瀉甘草煎照常加煨姜蔣副總諱彪號部院大廳患一病只惡寒畏風房間聚旺火不見熱被幾床不知暖諸醫以辛熱之藥投之勢益重豫視脈曰此內熱極不得清涼外寒極不得辛散也用末藥熱極者以酒送下次用表藥汗之即令撤其火與被而身體爽快矣四服全愈末藥方附子炮去皮一半面包煨一半生肉桂蒼朮各三錢甘草二錢為末分作四服陳酒儘量服之藥方麻黃人參白芍乾葛細辛澤瀉豬苓陳皮甘草加姜二片煎照常一友吳丕顯久病後只發嘔噁心不進飲食四肢困倦夜發冷汗日枯瘦藥無效豫視脈用溫腎湯加減為末日進一服隨效藥方柴胡麻黃根各四錢白茯苓人乳蒸白朮土炒黃柏酒炒豬苓酒炒升麻澤瀉炒陳皮神麯各六錢共為末每清晨用白滾湯吞一錢紀驗二刻錢牧齊先生患一症手足時患麻痹飲食停留通體不快如此數十年到處明醫酌方製藥並不效而年已古稀外自以殆將終身矣春初昭慶寺豫視脈曰此由心血中潤兩頭枯自湧泉血上行至心而回諸陽血下行至心而回上下不相應而氣沮矣是以有時上身快則下身不快下身快則上身不快飲食居中亦由之乎血欲上下不得而精神日漸槁此當先通山澤後濟坎離自覺有血上行有血下行之驗再服坎離丸半月飲食隨服隨化且覺飲食有味再閲月飲食較向來加倍每日多進一餐精神長益如壯年更勝焉山澤丸川芎酒蒸曬四兩當歸酒洗炒六兩升麻六兩川牛膝黑豆蒸曬六兩白茯苓人乳拌蒸四兩枳殼麩炒四兩共細末蜜丸梧子大每空心吞二錢坎離丸懷大地酒浸三宿蒸黑爛六兩天門冬去心用新瓦焙麥門冬去心新瓦焙各三兩何首烏黑豆九制八兩白朮半土炒半面炒四兩白茯苓去皮人乳拌蒸三兩川牛膝黑豆制蒸六兩山茱萸肉酒潤去核三兩芡實三兩甘枸杞四兩豨蘞草酒洗乳蒸三兩五味子二兩地骨皮酒蒸三兩人參二兩當歸酒洗炒四兩蜜丸梧子大每清晨白滾湯吞一錢臨睡酒吞一錢吳若谷先生患一症每飲食只在胸前作疼作響以乎捫之如有物久之飲食不下喘急煩悶痰症血症胥起日就黃瘦服藥不驗豫視脈曰此用心過度勞心傷痹以致血枯於心流窒包絡酌一方服之進頭一劑當使其血如輪轉氣如刺疼其血之枯者始潤滯者始行如此二三日即血度包絡而胃氣與心相迎再服補丸而心血與腎水相應體自康矣湯方前胡川芎生地黃桔梗赤芍當歸茯苓陳皮玉桂又丸方即固真丹加九制首烏鍾武卿婦患一症飲食不能進羸瘦已極忽吐血如傾五晝夜不止第六日目閉口噤直倒氣絶又閲一日是日化紙將入棺矣而血唾猶未止豫視脈無可蹤跡然脈氣尚在世有氣絶已久而生血上行者乎此必命門火未滅也用生大黃一錢搗爛入鼻孔須臾鼻氣漸通又以參三分同生蕙地六分入滾湯搗汁灌入喉須臾作嘆息而口能叫疼矣再視脈已有一息豫曰血者水穀之精生於心化於脾布於肺氣行則血行若內已受傷妄行於上此必盡出而後快者醫家不知誤用止血藥太多止血脾郁血遂不能化於脾矣脾不化則止血肺郁血遂不能化於肺矣脾不化則穀氣不入新血不生其叫疼者脾傷而肺筋下墜也氣已絶而血不止者為藥所誤而命火雖墜猶未滅心血消長也血脈自芤小弱者生脈靜身涼有似乎死而不知乃生機也是以投之輒驗湯方生地蕙一錢赤芍藥八分側柏葉一錢生艾葉八分黃芩一錢川芎八分服此方三劑而病體全愈用藥之奇在生大黃與生參地耳夫生大黃氣最盛脾血不化壅熱已極遂一吸而通且性寒能涼血隨以參培元氣地歸血路其氣已復以地芍柏艾芩芎除舊生新數劑愈矣梁吉之婦患肺癰膿血不止渴極舌生瘡不能開口大小便祕澀七日不通諸醫進硝黃亦不效豫視脈曰此非肺癰也毒在脾胃不能出其毒紅腫已極如拳大塞於腸口用大黃只能稍涼血而加以朴硝與之鬥血益妄行此當用化毒散瀉肺療風和中解毒俾其毒從汙中去者十之六從二便去者十之三而病療矣化毒散人參一錢黃芩一錢石膏二錢芒硝八分大黃一錢麻黃六分連翹八分瓜蔞八分牡蠣八分貝母八分木香六分桔梗八分梔子仁一錢當歸一錢川芎八分赤茯苓八分上方服一劑覺身上微冷被蓋出汗即能開口言語再服一劑小便流血水二三碗又一劑腹痛大便行皆膿血流兩個時始見硬糞內毒已清並口瘡全愈矣王爾用婦患一虛症頭眩目花手持物即軟足欲行即躓腹極飢欲食而一物不能下枯瘦如柴多痰短氣每服藥即胸膈如刺豫視脈曰此症服四物湯諸醫未始不是但服四物湯即痛如刺其故未曉也又他藥投之更痛遂束手不用藥矣豫許以兩劑即愈諸醫以豫有何如奇藥果兩日全愈反問豫所用者亦即四物湯也因語以四物湯亦即有異蓋此症宜芎歸等補藥然胸膈有痰氣肺火而脘竅未能即下補劑甚急而未能即受豫即用四物湯而先用枳殼一兩煮濃汁將四物入浸露一宿曬乾入煎夫枳殼寬胸理氣補劑才入而即寬稍寬而已過脘矣投之即驗蓋以此地黃當歸白芍川芎茯神牛膝白朮人參甘草煎照常柴完我患一症怔忡脹滿吞酸四肢厥冷飲食不下大小便每日行數次或多或澀十年尋醫不效豫視脈曰此誤認為中寒中濕症多用附子理中湯而益重也此症因好色過度醉後行房邪入筋絡上攻而怔忡中聚而脹滿入四肢而痠疼思飲食而不納皆邪火也數劑而愈湯方黃連山梔童便炒黑黃柏酒炒知母白茯苓五味子石蓮子木通甘草加黑棗二枚燈心七根姚思濟患一症筋攣頭重腰疼膝腫飲食減少甚至手足不能動諸醫不曉多用補劑風邪不出變症百出患十餘年服藥將滿車成不起之症矣豫視脈曰此肝腎氣虛風入筋骨當用烏頭全蠍等藥服五日而飲食進又五日而體輕又五日而手足持行如故末方烏頭炮去皮臍白附子炮蒼朮炒川芎天麻官桂羌活牛膝各一兩全蠍焙六錢殭蠶當歸防己黃耆蜜炙羌活各一兩五錢麝香三分共末酒服每服一錢五分汪善長患一症口中苦極苦茶入則發嘔咽疼不可忍不生瘡不發腫無可用藥謂是熱症以寒藥投之入喉即吐易辛熱投之益甚其疼諸醫無可奈何挨至半月飲湯全不能下食硬米飯日可進半碗身體乾瘦症益重惟待斃而已豫視脈曰同一熱症而此熱有異夫精氣出入滋養榮衛全在口心熱則口苦咽者胃之系胃熱極而作疼皆宜寒藥然寒藥入喉即吐此有故心胃熱宜湯飲然飲不能下反愛飯亦有故以此症乃臟肺積濕濕生火火炎上故口苦咽疼濕發於地飲者水類也水入重傷故雖宜寒藥而惡水煎脾熱口甘五穀皆甘美脾氣未傷故喜飯三劑全愈藥方川連一兩嫩石膏五錢淮山藥一兩白茯苓五錢共研極細每一次用五錢拌入硬米飯中才入口即覺甘美日進二服至三日口不苦咽不疼飲食胥進矣吳行之患赤白痢症三年體瘦面青飲食不下並畏聞飲食之氣熱者進即欲嘔諸藥服極多後並藥氣俱畏豫視脈曰夫氣血俱傷則赤白相兼總由濕熱攻之太急病將愈而重傷痢久胃虛遂飲食不進三年而腸胃不敗水穀不絶者以秉氣旺而初感亦未甚重因攻之太驟收澀太早邪氣去而復壅又多用參朮亦能調扶天氣而腸路不淨日久益增畏聞飲食之氣並藥氣者服湯藥過多中氣既傷邪勝於主穀氣者中氣也下不能化則中不能納凡熱則生氣畏氣者畏熱也原感濕熱邪氣甚則畏主氣也即病治病四劑而愈藥方川連五錢枳殼三錢木香三錢取井水一碗用前藥生磨冷服四日全愈此謂即病治病也病人既苦煎藥之氣畏不肯服是以服亦無功豫即不用入火之藥冷水生磨入口便覺爽快中其腸胃之氣也初入與邪氣相安既入則邪不能容反客為主奏功易易耳張修甫患一症腰痛重墜如負千斤惟行房時不見重服補腎等丸總不效豫視脈曰夫腰者腎之府腎氣虛斯病腰服補腎丸未嘗不是然何以行房時不見重瘀血滯之也故行房時腎搖而血行行即不瘀遂不見其重也二劑而愈湯方黃柏鹽水炒知母蜜炙烏藥桃仁去皮尖青皮紅花蘇木穿山甲木通各一錢甘草五分加黑棗一枚生薑二片謝家一孩子九歲初起感冒服藥五六日不效眼直手軟懶言語神色昏迷至九日忽然氣喘不省人事四肢冰冷三日以為死矣欲入棺只胸前火熱至第七日眼目鼻口手足俱冷而胸前火熱未除適豫過其門告以病緣豫視脈曰此由疳邪內作誤認為感冒而治其表臟氣受郁已極遂不能通心竅而同死人也胸前火熱者積表氣也法當下之上不下者下不上表裡呼應即得生機用硃砂鐵粉琥珀共八分挖開口灌之須臾胸前氣響運旋即有氣出口兩個時覺手足有動意再用升麻人參湯更吞朱鐵散八分腸中作響鼻息喘急通體微暖服湯藥三日而始能言語又服藥三日而始能開眼從死得生亦快事也鐵朱散硃砂二錢鐵粉一錢琥珀二錢參麻湯人參五分升麻五分白豆蔻六分香白芷三分湯方前三日用附子去皮炒五分南星姜炮八分沉香三分磨沖木香五分磨沖人參八分甘草三分湯方後三日用當歸一錢白朮八分白芍八分肉桂六分白茯苓六分川芎六分人參八分遠志六分甘草三分沈維新患一症腹如刺疼有時攻心咽如煙閉不能通氣諸醫不知何症一日換數藥不能忍遂欲自縊豫視脈曰此傷寒症初感能忍未經汗散陡至四五日沉重諸醫不知此謂其心疼咽煙遂以黃連解毒藥服之宜乎其益重而思死也用瓜蒂散吐之即心不疼只腹痛咽不煙只咽乾然後用四逆湯加減由從前顛倒用藥故其後遂先吐而後溫臟也李買甫患一症腹中每響動如雷有聲徹上下隔鄰猶聞之兩脅痛不可忍偶食肉即發後聞肉氣亦發初起面口俱青漸紫黑至不省人事如死樣三個時始得蘇藥總不效豫視脈曰此由傷食不得化積穢成塊體肥多血以血裹食其見肉即發者必系肉塊也肉欲出不能遂響動如雷末藥一料而愈末方山查肉一半酒炒一半生用四兩桃仁去皮尖二兩川芎山稜莪朮醋炒各三兩檳榔一兩砂針一兩醋炒共為末每空心酒吞三錢遊成宇患一症遍身畏寒夏月亦須綿襖夜即烘火鼻中全然不聞香臭鼻孔有一物豆大癢極若以手爪入則又痛極惟以黃泥入鼻知為土氣常半月不開口無醫可治豫視脈曰病有奇症醫有奇方此不必用藥只一晝夜即愈卻用毒手俾之苦極始得生路覓一間房極小不漏風四面有磚者其房四面俱錐一孔地下掘一小坑僅盤大可容人面病人住房內鎖閉用家艾百斤漸從四面孔內燒入自晨至午燒至三四十斤煙塞滿房不能容鼻沒奈何以頭觸之尋有空隙以鼻抵之即盤大可容人面者須臾覺鼻息通暢自午至子遍身熱極將綿襖俱脫天明開門看時其鼻中血落不畏風寒服補中益氣湯十劑全愈究此病所以因居樓上木氣太甚冬月用火太多無縫可泄木又生火積久成痼熱在臟腑寒在皮膚用艾以灸皮膚之寒而通臟腑之竅木入土而朽火入土而盡觀其病時惟聞有土氣固已得治法矣張太華患一症初起口瘡身熱用涼藥稍愈後漸神昏氣倦不思飲食久益見人不識手舞搖頭熱極但欲飲水以水腫不與飲屢用寒藥吐不能納豫視脈曰此病固宜寒藥而用寒藥亦有異夫病勢已久服藥已多見連柏等即吐者傷胃也夫濕鬱成熱火起於胃初起但涼膈散一服便清不早為計火鬱已極又多服寒藥胃傷畏寒因不相納豫亦用寒藥一劑而愈末方辰砂五分玄明粉八分真青黛六分人中白一錢共為末白滾湯吞下一服即愈再用六君子湯數劑蓋黃連等藥入胃遲留搜剔而未即行又其氣太寒因與胃鬥用辰砂等迅速易達腸胃積火久欲去此而出矣昭慶寺僧無量患一症腹中有塊如拳大沖左衝右衝上衝下晝夜叫號不息疼不可忍黃瘦已極至不進飲食月餘將斃矣豫視脈曰此因腸氣結澀起於濕熱毒氣逆行諸醫以木香豆蔻等通其氣氣通其塊益能行走以香熱大便益祕遂有衝上下之症末藥三服而愈末方大黃三錢黃連姜炒一錢人中白二錢枳殼麩炒三錢厚朴姜炒三錢桃仁二錢共末作三服林返孩患一症心重如千斤下墜背彎不能直每發時疼痛難忍眼珠直出舌俱咬碎無藥可療豫視脈曰此必打銅錫生理終日用力傷於飢飽間於欲事或因偷情為人所驚不得泄用槌則彎背驚則心血走不得泄則腎氣逆以氣裹血滲留胞絡遂成茲症究之此人果沙皮巷打銅匠也兩劑發汗而心輕兩劑通便而背直服八味地黃丸一料而用力生理如常時也湯方麻黃一錢香附八分羌活一錢茯神八分歸尾八分赤芍八分甘草四分湯方熟大黃三錢赤芍一錢黃柏一錢黃芩一錢檳榔一錢枳實一錢林隱寺僧遠塵患一症日身涼夜身熱遍體痛甚作止有時晝欲行則痛不可忍睡臥稍可夜欲睡則痛不可忍行動始安此僧極苦但欲速死豫視脈曰此由趺坐損血又有遺夢之症當其初坐時惟恐夜睡精漏故坐功俱用之夜而血益損日間飽食傷氣脾氣已倦當晝思臥血陰分逢陰不寧血虛火盛故晝涼夜熱也服滋陰抑火湯加減數劑而愈加減滋陰抑火湯天門冬去心麥門冬當歸地骨皮丹皮柴胡茯神菊花棗仁甘草加棗二枚燈心二十根朱化之患一症氣喘痰多骨瘦如柴天將明即思食食時以半碗飯作一口進則過喉易易可食飯七八碗若一碗飯分作五六口便不下咽多許則易少許則進更難真不可解天明後便不索食直至曉但飲湯坐臥痰喘竟夜而已豫視脈曰腎水全不傷此少年保養中年用心過度每睡輒思富貴長夜到曉心血虛耗氣壅火發傷肺諸醫以肺為氣之主腎為氣之藏逆奔體弱由腎虛不能收肺氣多用補劑益喘益弱豫用三拗湯加減數劑而愈蓋此症起於風邪積痰誤用參耆遂至喘促到底用麻黃者從根也天將明而思食由長夜思量到曉心血虛而胃氣陷亟欲以食填之且旦氣猶存保之更無濟矣多許易入喉者乘胃壓之則穀氣引胃直達而喘不能出若食少則喘易出而食難入矣日不食者日多不思神氣昏沉旦食未化也湯方白茯苓二錢麻黃不去節二錢杏仁不去皮尖二十四粒枳殼一錢甘草八分薑棗葉素方於冬十一月索豫視脈維時並無恙但欲制常服補丸耳豫曰且未定方其脈已有恙只旬日當發則寒熱交作為三日一發之疸瘧豫買舟去杭至次年四月歸悉如豫言因酌方服之三劑而愈湯方製厚朴制知母小柴胡青皮草果仁藿香葉製半夏白茯苓甘草葉成冶患積痢近十日腹疼後重不可忍豫視脈曰此非積非痢乃脾血虛而以食氣相觸致然耳酌方服之一劑不腹疼一劑不後重其積全愈湯方當歸白芍藥生地地骨皮白茯苓葉八五孫患傷寒症大便晝夜流水不息面赤而紫兩耳黑胸前有塊大如拳氣喘不絶下身冷至臍諸醫以為漏底欲止之而益重且面黑狂言唇青眼直咳喘不休發厥肌冷皆死症也求於豫豫曰此不必看脈但言症而已知其易療矣當其病在陽明胃經時不知用大黃黃芩諸藥只用九味羌活湯致表裡俱滯其大便流水不息者當其病在陽明胃經時所亟需全在大黃黃芩厚朴而以九味羌活發散上下兩礙內有硬糞不得出阻塞腸胃之路鬱血上攻故有此症耳用大承氣湯加減二服全愈呂蒼鱗患瘧症三年精神脾胃弱極豫酌方止用白朮一味制丸末服之一月而愈閲半載余忽一日豫視脈曰據此脈過三日當忽然神昏眼暈不省人事百節皆作疼因酌方俟其發維時精氣正旺諸友不之信至三日果應豫言服藥始愈陸春元諱長卿字效如乃正患一症頭重發熱遍體俱疼飲食不進遍請醫調治其症益重晝夜嘔吐不能出進以湯藥益加重每吐出有蛔蟲數條後並湯藥不能下如此者半月餘以無復生理矣豫視脈曰此原非死症也服藥不中其病而病日增遂並藥湯不能下餘隻用梔子仁薑汁炒與豆蔻二味白滾湯下但得過喉便胸前作疼不可忍其病即可療矣服藥果如豫言每日酌一方服之半月全愈蓋此症初起風寒外感諸醫誤用補劑其寒不經發散咸積於胸胃氣不能上升咸發為火腸胃燧熱已極蛔蟲頭上抵至胃脘以上寒處安身而不知寒處皆死路也上寒以豆蔻仁散之下熱宜梔子仁梔子仁性寒難度上膈故用炒是以投之即驗也李公祖衢兵道號庚生長媳王氏患一症頸項紅腫小腹有一股氣直衝喉間疼極飲食不能進者七日醫以腫毒欲散之其症益甚豫視脈曰此非腫毒也細按之此受胎脈也世有飲食全不者七八日而能生者乎惟有胎者不然此初感時大風大霧其正者結而為胎邪者發而為毒但詢以經期才過期六日豫認定受胎酌一方平氣寬脾固胎元之藥數劑而安後果如言而王氏竟從夫之變以節義終其貞烈固不可及哉李公祖衢刑廳號暗修患一症胸前有小塊初不疼癢醫家以為腫毒宜打散用膏藥貼上竟發紅作疼日盛豫視脈曰此皮疽也內有硬疔如小指大當用湯藥攻出又以敷藥薄其皮二十日其疔即化而為膿膿出全康湯方何首烏金銀花貝母天花粉皂角刺當歸尾甘草節敷藥方何首烏天南星大白芷川烏大黃共為末醋塗四圍余用成患一症飲食不能下勉強飲食即嘔逆作痛而每日勤勞作事如常時日飲參湯數鍾諸藥皆不效豫視脈曰此重勞不節之症也勞心勞力無已時於勞時進食又多食是以不節勞則傷脾不節食則傷胃胃傷不納脾傷不化其精力無損易治也擇一靜室令入室靜坐初坐竟不進飲食坐至次日覺神方稍寧有欲得食之意然後以稀粥與之至三四日竟欲得食至七日食過膈矣此謂以其人治人之病也徐玉玄婦患一症月餘不能眠每日扶坐氣喘急頭與腿足皆腫大至第四十日喉鼻中出氣皆冰冷者每暈倒不省人事諸醫以為毫無生理矣豫視脈曰此奇症也最易愈世安有四十日不能稍眠不能食鼻中出氣已冷而能生者乎此由産後血上攻其血欲從口中出不能故其血已死凝於喉雖有生氣從死血中過其氣已冷血凝氣冷但能飲湯其湯作脹而浮腫於頭面手足死血在喉若睡倒即氣不能上升而生理絶是以月餘不睡者求生也酌一方用磨平飲加減通其血才進藥而能睡睡醒而能氣暖數日全愈湯方紅花桃仁蘇木蓬莪朮枳殼烏藥當歸京三稜白芍藥葉楚鄂初患一症體瘦如柴而肚漸大其中有物飲食不能進豫視脈酌一方許以愈其半果如豫言其半非藥所能及也因求豫靜功孰知道緣作合七日開關覺通體爽快其腹中積物竟從口中嘔出舊病全愈經今四載忽有家事盛怒又當風飲食復感一症泄瀉不止豫為治之愈後又感一症為咳逆吞酸四肢疲軟氣將絶欲去世者幾番豫視脈曰此命門火不上升之症也用附子升之又以肉桂浮藥養之其症漸愈後復如常數月後適豫有蘭江之行葉楚鄂一晚口吐血半碗吐後復爽快此時正當用參桂等藥固其元神時醫不知此妄用涼藥僅兩日而症變矣來蘭江請豫豫見其方初用涼血之劑後琥珀沉以下脫文
